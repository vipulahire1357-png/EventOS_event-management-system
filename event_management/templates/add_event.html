{% extends "base.html" %}
{% block title %}Add Event{% endblock %}
{% block page_title %}Add Event{% endblock %}
{% block breadcrumb %}Home / Events / Add New{% endblock %}

{% block topbar_actions %}
<a href="{{ url_for('events') }}" class="btn btn-secondary">← Back to Events</a>
{% endblock %}

{% block content %}
<div style="max-width:700px">
    <div class="card">
        <div class="card-header">
            <h3>🎉 New Event Details</h3>
        </div>
        <div class="card-body">
            <form method="POST" action="{{ url_for('add_event') }}">
                <div class="form-grid">
                    <div class="form-group full">
                        <label>Event Name *</label>
                        <input type="text" name="name" placeholder="e.g. Tech Summit 2025" required />
                    </div>
                    <div class="form-group">
                        <label>Date *</label>
                        <input type="date" name="date" required />
                    </div>
                    <div class="form-group">
                        <label>Time *</label>
                        <input type="time" name="time" required />
                    </div>
                    <div class="form-group full">
                        <label>Location *</label>
                        <input type="text" name="location" placeholder="Venue name, City" required />
                    </div>
                    <div class="form-group full">
                        <label>Description</label>
                        <textarea name="description" placeholder="Brief description of the event…"></textarea>
                    </div>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">🎉 Create Event</button>
                    <a href="{{ url_for('events') }}" class="btn btn-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
